<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adivina el Número</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
  </head>
  <body>
    <!-- Video de fondo -->
    <video src="pagina.mp4" autoplay muted loop></video>

    <main class="game-card">
      <h1>Adivina el Número</h1>
      <p class="subtitle">Estoy pensando en un número del 1 al 100...</p>

      <div class="controls">
        <input
          type="number"
          id="inputIntento"
          min="1"
          max="100"
          placeholder="?"
          autofocus
        />
        <button id="btnAdivinar">Adivinar</button>
      </div>

      <!-- Intentos-->
      <div class="feedback-area">
        <p id="mensaje"></p>
        <p id="contador">Intentos: 0</p>
      </div>

      <div class="historial-container">
        <span class="historial-label">Registros</span>
        <div id="historial"></div>
      </div>

      <button id="btnReiniciar" style="display: none">Jugar de nuevo</button>

      <audio id="musicaFondo" src="musicafondo.mp3" autoplay loop></audio>

      <div class="volume-container">
        <span>🔈</span>
        <input
          type="range"
          id="volumenControl"
          min="0"
          max="1"
          step="0.1"
          value="0.3"
        />
        <span>🔊</span>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
